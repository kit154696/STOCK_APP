<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ — ระบบบัญชีคุมวัสดุ อปท.</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #234578;
            --primary-dark: #0f2240;
            --accent: #c59a2e;
            --accent-light: #e8c55a;
            --danger: #b91c1c;
            --danger-bg: #fef2f2;
            --border: #d4d8e0;
            --text: #1e293b;
            --text-muted: #64748b;
            --font-main: 'Sarabun', sans-serif;
            --font-head: 'Noto Serif Thai', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, var(--primary-dark) 0%, var(--primary) 55%, var(--primary-light) 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background decorative elements */
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: rgba(197, 154, 46, 0.06);
            top: -200px; right: -200px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            bottom: -150px; left: -100px;
            pointer-events: none;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            width: 420px;
            max-width: 100%;
            box-shadow: 0 25px 80px rgba(0,0,0,0.35);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            background: var(--primary);
            padding: 32px 36px 28px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
            position: relative;
        }

        .logo-circle {
            width: 72px; height: 72px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--primary-dark);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
            margin: 0 auto 16px;
            box-shadow: 0 4px 16px rgba(197,154,46,0.4);
        }

        .card-header h1 {
            font-family: var(--font-head);
            font-size: 1.15rem;
            color: white;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .card-header .sub {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.6);
        }

        .card-body { padding: 32px 36px 36px; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.95rem;
            pointer-events: none;
        }

        .input-wrap input {
            width: 100%;
            padding: 12px 44px 12px 40px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: var(--font-main);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafbfc;
        }

        .input-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26,54,93,0.1);
            background: white;
        }

        .input-wrap .toggle-pw {
            position: absolute;
            right: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.95rem;
            padding: 4px;
            transition: color 0.2s;
        }
        .input-wrap .toggle-pw:hover { color: var(--primary); }

        .btn-login {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font-main);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 12px rgba(26,54,93,0.25);
            margin-top: 4px;
        }

        .btn-login:hover { background: var(--primary-light); box-shadow: 0 6px 16px rgba(26,54,93,0.3); }
        .btn-login:active { transform: scale(0.99); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .error-box {
            display: none;
            background: var(--danger-bg);
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 11px 14px;
            color: var(--danger);
            font-size: 0.88rem;
            margin-bottom: 18px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-box.show { display: flex; }

        .card-footer {
            padding: 14px 36px 20px;
            text-align: center;
            font-size: 0.78rem;
            color: var(--text-muted);
            border-top: 1px solid #f1f3f7;
        }

        .card-footer strong { color: var(--primary); }

        .spinner-inline {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="card-header">
            <div class="logo-circle"><i class="fas fa-landmark"></i></div>
            <h1>ระบบบัญชีคุมวัสดุ อปท.<br>(ว.1095)</h1>
            <div class="sub">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</div>
        </div>

        <div class="card-body">
            <div id="errorBox" class="error-box">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMsg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</span>
            </div>

            <div class="form-group">
                <label>ชื่อผู้ใช้</label>
                <div class="input-wrap">
                    <i class="fas fa-user icon"></i>
                    <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" autocomplete="username"
                           onkeydown="if(event.key==='Enter') document.getElementById('password').focus()">
                </div>
            </div>

            <div class="form-group">
                <label>รหัสผ่าน</label>
                <div class="input-wrap">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="password" placeholder="กรอกรหัสผ่าน" autocomplete="current-password"
                           onkeydown="if(event.key==='Enter') doLogin()">
                    <span class="toggle-pw" onclick="togglePw()" title="แสดง/ซ่อนรหัสผ่าน">
                        <i id="pwEye" class="fas fa-eye"></i>
                    </span>
                </div>
            </div>

            <button class="btn-login" id="btnLogin" onclick="doLogin()">
                <div class="spinner-inline" id="spinner"></div>
                <i class="fas fa-sign-in-alt" id="btnIcon"></i>
                <span id="btnText">เข้าสู่ระบบ</span>
            </button>
        </div>

        <div class="card-footer">
            ผู้ดูแลระบบ: <strong>admin</strong> &nbsp;|&nbsp; เจ้าหน้าที่: <strong>user</strong>
        </div>
    </div>

    <script>
        // Redirect ถ้า login อยู่แล้ว + แสดง error จาก query string
        window.onload = async () => {
            try {
                const res = await fetch('/api/me', { credentials: 'same-origin' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.success) window.location.href = '/';
                }
            } catch(e) {}

            // แสดง error ถ้ามี ?error= ใน URL
            const params = new URLSearchParams(window.location.search);
            const errCode = params.get('error');
            if (errCode) {
                const messages = {
                    rate_limit: 'ลองเข้าสู่ระบบผิดพลาดหลายครั้งเกินไป กรุณารอ 15 นาทีแล้วลองใหม่',
                };
                const msg = messages[errCode] || 'เกิดข้อผิดพลาด กรุณาลองใหม่';
                document.getElementById('errorMsg').textContent = msg;
                document.getElementById('errorBox').classList.add('show');
                // ลบ query string ออกจาก URL โดยไม่ reload
                history.replaceState(null, '', '/login');
            }

            document.getElementById('username').focus();
        };

        function togglePw() {
            const input = document.getElementById('password');
            const eye = document.getElementById('pwEye');
            if (input.type === 'password') {
                input.type = 'text';
                eye.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                eye.className = 'fas fa-eye';
            }
        }

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');
            const btn = document.getElementById('btnLogin');
            const spinner = document.getElementById('spinner');
            const btnIcon = document.getElementById('btnIcon');
            const btnText = document.getElementById('btnText');

            errorBox.classList.remove('show');

            if (!username || !password) {
                document.getElementById('errorMsg').textContent = 'กรุณากรอกชื่อผู้ใช้และรหัสผ่าน';
                errorBox.classList.add('show');
                return;
            }

            // แสดง loading
            btn.disabled = true;
            spinner.style.display = 'block';
            btnIcon.style.display = 'none';
            btnText.textContent = 'กำลังเข้าสู่ระบบ...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    btnText.textContent = 'สำเร็จ!';
                    spinner.style.display = 'none';
                    btnIcon.style.display = 'inline';
                    btnIcon.className = 'fas fa-check';
                    btn.style.background = '#16794a';
                    setTimeout(() => { window.location.href = '/'; }, 400);
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
                    errorBox.classList.add('show');
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (e) {
                document.getElementById('errorMsg').textContent = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์';
                errorBox.classList.add('show');
            } finally {
                if (!document.getElementById('btnText').textContent.includes('สำเร็จ')) {
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    btnIcon.style.display = 'inline';
                    btnIcon.className = 'fas fa-sign-in-alt';
                    btnText.textContent = 'เข้าสู่ระบบ';
                }
            }
        }
    </script>
</body>
</html>
